name: Continuous Training Pipeline

on:
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sundays at midnight UTC
  workflow_dispatch:     # Allow manual trigger from the GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Download Latest Dataset
      env:
        KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
      run: |
        mkdir -p data/raw
        kaggle datasets download -d blastchar/telco-customer-churn -p data/raw --unzip
        
    - name: Run Training Pipeline
      env:
        MLFLOW_TRACKING_URI: ./mlruns
      run: |
        python src/train.py --model xgboost
        
    - name: Commit and Push new Model (if changed)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add models/best_model.joblib data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update model via CI/CD pipeline" && git push)
